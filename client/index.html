<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Wind Generation Monitoring & Analysis Suite - Monitor UK wind power generation forecasts" />
    <title>Wind Generation Monitor</title>
    <!--
      VITE vs CRA DIFFERENCE:
      In Vite, index.html lives at the project ROOT (not public/).
      Vite uses this as the entry point and injects the JS module via
      the <script type="module"> tag below.
      
      CRA used webpack which injected scripts automatically.
      Vite requires you to explicitly include the entry script.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Vite requires explicit script tag (CRA injected this automatically) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
