<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Wind Generation Monitoring & Analysis Suite - Monitor UK wind power generation forecasts" />
    <title>Wind Generation Monitor</title>
    <!--
      WHAT IS THIS FILE?
      This is the single HTML file that React mounts into.
      React is a "Single Page Application" (SPA) framework - meaning
      the entire app runs inside ONE HTML page. JavaScript dynamically
      updates what you see without loading new pages.
      
      The <div id="root"> below is where React injects all its components.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
